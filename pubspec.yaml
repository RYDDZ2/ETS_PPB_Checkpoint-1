name: gymform
description: GymForm - Your personal gym companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (NO firebase_storage - pakai Firestore base64 aja)
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.14.0

  # Camera & Gallery
  image_picker: ^1.0.7
  permission_handler: ^11.3.0

  # Image compression (untuk base64)
  image: ^4.1.7

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^5.0.2

  # UI
  google_fonts: ^6.1.0

  # Video tutorial in-app
  youtube_player_iframe: ^5.1.3

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
